name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Call OpenAI API and post summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "content-type: application/json" \
            -d "$(jq -n --arg diff "$DIFF" '{
              model: "gpt-4o",
              max_tokens: 1024,
              messages: [{
                role: "user",
                content: ("Summarize the following PR diff in plain English. Focus on: what changed, why it matters, and any potential risks.\n\n" + $diff)
              }]
            }')")
          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          BODY=$(printf "## AI PR Summary\n\n%s" "$SUMMARY")
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$BODY" \
            --repo ${{ github.repository }}
